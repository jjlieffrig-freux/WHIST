<script>

async function savePdf() {
    console.log("========================== Start process to generate PDF file ==========================");
    const strD = parent.frames['HDR'].document.getElementById('COOKIE').value;
    const nbrJ = parent.frames['HDR'].document.getElementById('NPARTIE').value;
    console.log("NAVIG|Generation PDF pour la partie ["+strD+"] de "+nbrJ+" jeu(x)...");
    //const element = parent.frames['RESU'].document.getElementById('RESULTATS').innerHTML;
    const element = document.getElementById("RESULTATS").innerHTML;
    console.log("(W)-HTML DATA SIZE:"+element.toString().length)

    const htmName = strD+"-rapport.htm";
    const pdfName = strD+"-rapport.pdf";

    //const blob = new Blob([element], { type: 'text/html' });
    //const a = document.createElement('a');
    //a.href = URL.createObjectURL(blob);
    //a.download = htmName;
    //a.click();
    //URL.revokeObjectURL(a.href);

    console.log("URL path:"+window.location.pathname);
    const fldr = saveFile(htmName, element);
    if ( fldr === "" ) { fldr = (window.location.pathname).toString(); }

    const textINFO = {
            in: htmName,
            out: pdfName,
            nbr: nbrJ,
            fld: fldr
            };
    const jsonINFO = JSON.stringify(textINFO);
    console.log(JSON.stringify(textINFO, null, 2));

    const swCONNECT = "GET";
    switch (swCONNECT)
        {
        case "GET": 
            params   = new URLSearchParams(textINFO);
            console.log("GET\t\t"+params);           
            try {             
                response = await fetch(`http://localhost/api/generate2PDF?${params.toString()}`);
                data = await response.json();
                console.log("FETCH GET Response:\t"+data);
                } 
            catch (error) {
                console.error('FETCH GET Error:', error);
                }
            break;
        case "POST": 
            console.log("POST\t\t"+jsonINFO );
            try {
                response = await fetch('/api/generate2PDF', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: jsonINFO 
                    })
                if (!response.ok) {
                    throw new Error(`FETCH POST HTTP error: ${response.status}`);
                    }
                data = await response.json();
                console.log('FETCH POST Response:', data);
                } 
            catch (error) 
                {
                console.error('FETCH POST Error:', error);
                }
            break;
        default: 
            return false;
        }
    console.log (swCONNECT+" Request to generate PDF File '"+pdfName+" sent.")
    }

async function saveFile(htmlFile, htmlTEXT) 
    {
    const dirHandle = await window.showDirectoryPicker();
    await dirHandle.removeEntry(htmlFile);
    const folderName = dirHandle.name;
    console.log("TARGET FOLDER:"+folderName);
    
    const handle = await window.showSaveFilePicker({
        suggestedName: htmlFile,
        types: [{
            description: "HTML File",
            accept: { "text/html": [".html"] }
            }]
         });
    console.log("Saving HTML to file ["+folderName+"/"+htmlFile+"]");
    const writable = await handle.createWritable();
    await writable.write(htmlTEXT);
    await writable.close();
    console.log("Saving done");
    return folderName;
    }

</script>

function analyseCookie()
	{
	//var ckNameDef = parent.frames['TITRE'].document.getElementById("CKNAME").value;
	//var ckNamePfx = parent.frames['TITRE'].document.getElementById("PARPFX").value;
	var ckNameDef = reuseParameter("ckNameDef");
	var ckNamePfx = reuseParameter("ckNamePfx");
	var strCookie = getCookie2(ckNameDef);

	console.log("ckNameDef:"+ckNameDef+"\t\tckNamePfx:"+ckNamePfx+"\t\tCOOKIE:"+strCookie);

	document.getElementById("ckNameDef").value = ckNameDef; 
	document.getElementById("ckNamePfx").value = ckNamePfx;
	document.getElementById("COOKIE").value = strCookie;

	const userAgent = navigator.userAgent;
	console.log("BROWSER:"+userAgent);

	let browser = "Unknown";
	if ( userAgent.includes("Firefox") ) { browser = "Firefox"; }
	if ( userAgent.includes("Edg")     ) { browser = "Edge";    }
	if ( userAgent.includes("Safari")  ) { browser = "Safari";  }
	if ( userAgent.includes("Brave")   ) { browser = "Brave";   }
	if ( userAgent.includes("Chrome")  ) { browser = "Chrome";  }

	const swDisplay = 2;
	switch (swDisplay)
		{
		case 1: 
			// Affichage du LOCALSTORAGE & COOKIE du navigateur
			var btnBROWSER = '<button type="button" class="btn-primary" ONCLICK="JavaScript:viewLS()">'+browser+'</button>';
			break;
		case 2: 
			// Affichage des infos sur le navigateur
			var btnBROWSER = '<button type="button" class="btn-primary" ONCLICK="JavaScript:getBrowserInfo()">'+browser+'</button>';
			break;
		default: 
			// Sinon..... Affichage des infos sur le navigateur
			var btnBROWSER = '<button type="button" class="btn-primary" ONCLICK="JavaScript:getBrowserInfo()">'+browser+'</button>';
		}
	document.getElementById("BRWBOUT").innerHTML = btnBROWSER;
}

function getBrowserInfo()
	{
	const browserInfo = {
		userAgent: navigator.userAgent,
		appName: navigator.appName,
		appVersion: navigator.appVersion,
		platform: navigator.platform,
		language: navigator.language,
		languages: navigator.languages,
		cookieEnabled: navigator.cookieEnabled,
		onLine: navigator.onLine,
		hardwareConcurrency: navigator.hardwareConcurrency,
		deviceMemory: navigator.deviceMemory,
		vendor: navigator.vendor,

		screenWidth: screen.width,
		screenHeight: screen.height,
		availableWidth: screen.availWidth,
		availableHeight: screen.availHeight,
		colorDepth: screen.colorDepth,
		pixelDepth: screen.pixelDepth,

		windowWidth: window.innerWidth,
		windowHeight: window.innerHeight,

		timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
		currentURL: location.href,
		hostname: location.hostname,
		protocol: location.protocol
		};


	var divData = String(parent.frames['RESU'].document.getElementById("RESULTATS").innerHTML);
	divData  = divData.replace(/<tr>/gi,      '\n<TR>');
	divData  = divData.replace(/<tbody>/gi,   '\n<tbody>');
	divData  = divData.replace(/<\/tbody>/gi,  '\n<\/tbody>');
	divData  = divData.replace(/<thead>/gi,   '\n<thead>');
	divData  = divData.replace(/<\/thead>/gi, '\n<\/thead>');
		
	var dataBRW = "";
	dataBRW += JSON.stringify(browserInfo, null, 2);
	dataBRW += "\n"+divData;

	var newWindow = window.open("", "", "height=450,width=950,top=150,left=250,resizable=yes");
	const pre = document.createElement('pre');
	pre.textContent = dataBRW;
	newWindow.document.body.appendChild(pre);

	}

function viewLS() 
	{
	var preText = '<ol style="Courier New", Courier, monospace;>\n';
	var data = viewLocalStorage(2);
	console.log(data);
	var oldLine = ""; var oldKey  = "";
	for (let i = 0; i < data.length; i++) {
		var skipLine = "";
		var curLine = data[i].toString();
		var curKey  = curLine.split(".")[0];
		if ( oldLine !== null && oldKey !== curKey ) { skipLine = '<hr style="height: 10px; border: none; background-color: red;">'; }
		oldLine = curLine; oldKey = curKey;
		preText += skipLine + `<LI>&nbsp;&nbsp;${curLine}</LI>\n`;
		}
	preText += "</OL>\n";
	var newWindow = window.open("", "", "height=250,width=950,top=350,left=450,resizable=yes");
	newWindow.document.body.innerHTML = preText;
	};

		switch (partie+".")
			{
			case strANN:	
				break;
			case strJOU:	
				break;
			case strAPP:	
				break;
			default:
				cpt++;
				console.log("ENTETE: Trouvé PARTIE n°"+cpt+": "+partie);
				if (cpt%4==0) { strBUTTON += "<BR>"; } 
				strBUTTON += "<input type='button'   class='btn-primary' value='"+partie+"' ONCLICK='JavaScript:choosePartie(this.value)'>&nbsp;"

function refreshTime() {
  	const hString = String(new Date().getHours()).padStart(2, '0');
	const mString = String(new Date().getMinutes()).padStart(2, '0');
	const sString = String(new Date().getSeconds()).padStart(2, '0');
	document.HEADER.HEURE1.value = hString+":"+mString+":"+sString;
	}

function rafraichir2Pages() {

		document.cookie = delKeyCookie;

	}

<html>
<head>
<link rel="stylesheet" href="Whist.css">    
</head>

<body>
    <FORM>
        <TABLE BORDER="1">
        <TR BGCOLOR="YELLOW" ALIGN="CENTER">
            <TD WIDTH="250px">Joueurs</TD>
            <TD WIDTH="150px">JEUX</TD>   
        </TR>
        <TR BGCOLOR="LIGHTBLUE"><TD>
            <UL id="joueurs"><!-- --></UL>
        </TD><TD WIDTH="250px"> 
        &nbsp;<BR>
            <SELECT id="points" SIZE="7"><!-- --></SELECT>
        <BR>&nbsp;<CENTER>
        <TEXTAREA id="pointsTAB" ROWS="7" COLS="80" style="display:none";>   
        </TEXTAREA>
        <BR><INPUT type="button" VALUE="IMPRIME" ONCLICK="JavaScript:imprimePoints()"
        </CENTER></TD></TR>
        </TABLE>

<SCRIPT >
function imprimePoints()
	{
    var htmlStr = document.getElementById("pointsTAB").value;
    htmlStr = htmlStr.replace("\n","<Br>").replace("\r","<Br>");
    htmlStr = "&lt;HTML&gt;&lt;BODY&gt;"+htmlStr+"&lt;/BODY&gt;&lt;/HTML&gt;";
    htmlStr = htmlStr.replaceAll("&lt;","<").replaceAll("&gt;",">");
    //alert(htmlStr);
    var myWindow = window.open("", "WHIST", "width=400,height=500");
	myWindow.document.write(htmlStr);
	}    
</SCRIPT>


<script> 
    
    main()

    async function main()
        {

        const joueurs = await getData("J");
        const joueursUL = document.querySelector("#joueurs");
        for (const joueur of joueurs) {
            joueursUL.innerHTML += `<LI>${joueur.CODE} - ${joueur.PRENOM} ${joueur.NOM}</LI>`;
            }

        const esp1  = ".".repeat(15); 
        const esp2  = "&nbsp;".repeat(2); 
  
        const points    = await getData("P");
        const pointsUL  = document.querySelector("#points");
        const pointsTAB = document.querySelector("#pointsTAB");
		pointsTAB.innerHTML  = `<TABLE BORDER=0 CELLSPACING=1 CELLPADDING=10><TR>\n`;
		pointsTAB.innerHTML += `<TD BGCOLOR=YELLOW>ANNONCES</TD><TD BGCOLOR=YELLOW>JEUX</TD><TD BGCOLOR=YELLOW>POINTS</TD><TD></TD>\n`;
 		pointsTAB.innerHTML += `<TD BGCOLOR=YELLOW>ANNONCES</TD><TD BGCOLOR=YELLOW>JEUX</TD><TD BGCOLOR=YELLOW>POINTS</TD></TR>\n`;
 
        var sw=0
        for (const point of points) {
            var pts  = point.POINTS.trim();
            var mise = point.MISE.trim().concat(esp1).substring(0, 15).concat(esp2);
            var jeu  = ("("+point.JEU.trim()+")".concat(esp1)).substring(0, 9).concat(esp2);
            var ann  = mise+jeu+pts;
            pointsUL.innerHTML  += `<OPTION VALUE="">${ann}</OPTION>`;
            sw += 1
            isEven = sw % 2 === 0
            if ( isEven )
                {
                pointsTAB.innerHTML += `<TR><TD>${mise}</TD><TD>${jeu}</TD><TD>${pts}</TD>`; 
                pointsTAB.innerHTML += `<TD>${esp2}${esp2}${esp2}${esp2}${esp2}</TD>\n`;   
                } 
            else {
                pointsTAB.innerHTML += `<TD>${mise}</TD><TD>${jeu}</TD><TD>${pts}</TD></TR>\n`;
                }
            }
        console.log("SW="+sw);
        var isOdd = sw % 2 === 0
        if ( isOdd )
                {
                pointsTAB.innerHTML += `<TD>&nbsp;</TD><TD>&nbsp;</TD><TD>&nbsp;</TD></TR>\n`;    
                } 
        pointsTAB.innerHTML += `</TABLE>`;

        }
    async function getData(strFile)
        {
            switch (strFile)
                {
                case "J":
                    var res = await fetch("Joueurs.json");
                    break;
                case "P": 
                    var res = await fetch("Points.json");
                    break;
                default: 
                    var res = null;
                }
            const data = res.json();
            return data;
        };

</script>  


</form> 

</body>
</html>
